# GPX file mapping for race distances.
# This file is used by RaceCatalog to resolve GPX paths for predictions.
# Race results and metadata are in the database (see catalog.yaml for parse links).
races:
  - id: alpine_race_kz
    name: Alpine Race
    distances:
      - id: skyrunning
        name: Skyrunning
        distance_km: 4.0
        elevation_gain_m: 900
        start_altitude_m: 2200
        finish_altitude_m: 3200
        gpx_file: Almaty_Alpine_race.gpx
